apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swarm-team-six.fullname" . }}
  labels:
    {{- include "swarm-team-six.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "swarm-team-six.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "swarm-team-six.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: swarm-detect
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/swarm/config.yaml
            - --serve
            - --bind
            - 0.0.0.0:{{ .Values.service.port }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - wget -qO- http://127.0.0.1:{{ .Values.service.port }}/prestop >/dev/null || true
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/swarm/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: {{ include "swarm-team-six.stateRoot" . }}
            {{- if .Values.scratchVolume.enabled }}
            - name: scratch
              mountPath: {{ .Values.scratchVolume.mountPath }}
            {{- end }}
            {{- if or .Values.secrets.existingSecret (and .Values.secrets.enabled (gt (len .Values.secrets.files) 0)) }}
            - name: secrets
              mountPath: {{ .Values.secrets.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "swarm-team-six.fullname" . }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "swarm-team-six.fullname" . }}
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.scratchVolume.enabled }}
        - name: scratch
          emptyDir: {}
        {{- end }}
        {{- if or .Values.secrets.existingSecret (and .Values.secrets.enabled (gt (len .Values.secrets.files) 0)) }}
        - name: secrets
          secret:
            secretName: {{ include "swarm-team-six.secretName" . }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "swarm-team-six.tlsSecretName" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
