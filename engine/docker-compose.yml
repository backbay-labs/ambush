services:
  swarm-detect:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    volumes:
      - ./rulesets:/app/rulesets:ro
    environment:
      RUST_LOG: info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3

  nats:
    image: nats:2-alpine
    profiles:
      - nats
    ports:
      - "127.0.0.1::4222"
      - "127.0.0.1::8222"
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  nats-data:
